{% extends 'bookings/base.html' %}
{% block title %}Login — Tales Hotel{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;background:var(--cream);padding:3rem 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div style="background:white;padding:3rem;border-top:4px solid var(--gold);box-shadow:0 10px 40px rgba(0,0,0,0.08);">
                    <div class="text-center mb-4">
                        <p style="color:var(--gold);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;">Welcome Back</p>
                        <h2 style="font-size:2.2rem;">Sign In</h2>
                        <div class="gold-divider center"></div>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        {% if form.errors %}
                        <div class="alert alert-danger" style="font-size:0.82rem;">Invalid username or password. Please try again.</div>
                        {% endif %}
                        <button type="submit" class="btn btn-gold w-100 py-2">Sign In</button>
                    </form>
                    <p class="text-center mt-4" style="font-size:0.82rem;color:var(--text-muted);">Don't have an account? <a href="{% url 'register' %}" style="color:var(--gold);font-weight:600;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
